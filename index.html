<head>

  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://privatelivesmatter.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://privatelivesmatter.com/" />
  <meta property="og:title" content="Private Lives Matter | Coming Soon" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://privatelivesmatter.com/" />
  <meta property="twitter:title" content="Private Lives Matter | Coming Soon" />
  <meta property="twitter:description" content="Something new is coming. To the peak, not the precinct." />
  <meta property="twitter:image" content="https://privatelivesmatter.com/new_collection.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Raleway', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('/new_collection.png');
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 680px;
      width: 100%;
    }

    .logo-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .logo-text span {
      color: #F9F871;
    }

    .tagline {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: #aaaaaa;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #F9F871;
      margin: 0 auto 3rem;
    }

    .headline {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    .headline em {
      color: #F9F871;
      font-style: normal;
    }

    .subtext {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: #bbbbbb;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .social-links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social-links a {
      color: #ffffff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid #444;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .social-links a:hover {
      color: #F9F871;
      border-color: #F9F871;
    }

    .footer-note {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: #555555;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="logo-text">Private <span>Lives</span> Matter</p>
    <p class="tagline">PLM™ — Festival &amp; Rave Wear</p>
    <div class="divider"></div>
    <h1 class="headline">Something new is <em>coming.</em></h1>
    <p class="subtext">
      We're working on something worth the wait.<br />
      Hidden pockets. Bold threads. Built for the dancefloor.
    </p>
    <nav class="social-links">
      <a href="https://instagram.com/privatelivesmatter.com_" target="_blank" rel="noopener">Instagram</a>
      <a href="https://tiktok.com/@privatelivesmatter" target="_blank" rel="noopener">TikTok</a>
      <a href="mailto:hello@privatelivesmatter.com">Contact</a>
    </nav>
    <p class="footer-note">To the peak, not the precinct.</p>
  </div>
</body>
</html>
