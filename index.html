<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Lives Matter | Coming Soon</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Raleway', sans-serif;
      background-color: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Subtle noise/grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blobs */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .glow-coral {
      width: 600px; height: 600px;
      background: #FF6B6B;
      top: -150px; left: -150px;
    }
    .glow-yellow {
      width: 500px; height: 500px;
      background: #F9F871;
      bottom: -100px; right: -100px;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 700px;
      width: 100%;
    }

    .brand {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .brand span {
      color: #FF6B6B;
    }

    .tagline {
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #F9F871;
      margin-bottom: 3rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #FF6B6B;
      margin: 0 auto 3rem;
    }

    .headline {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: #ffffff;
      margin-bottom: 1rem;
    }

    .body-text {
      font-size: clamp(0.875rem, 2vw, 1rem);
      color: #888;
      line-height: 1.75;
      max-width: 480px;
      margin: 0 auto 3rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .link {
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: #ffffff;
      border-bottom: 1px solid #FF6B6B;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .link:hover {
      color: #FF6B6B;
      border-color: transparent;
    }

    .footer-note {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.05em;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="glow glow-coral"></div>
  <div class="glow glow-yellow"></div>

  <div class="container">
    <div class="brand">Private<span>Lives</span>Matter</div>
    <div class="tagline">To the peak, not the precinct.</div>

    <div class="divider"></div>

    <h1 class="headline">We're getting a fresh look.</h1>
    <p class="body-text">
      Something new is on the way. We'll be back soon — louder, bolder, and ready for the dancefloor.
    </p>

    <div class="links">
      <a class="link" href="https://instagram.com/privatelivesmatter.com_" target="_blank" rel="noopener">Instagram</a>
      <a class="link" href="mailto:hello@privatelivesmatter.com">Get in touch</a>
    </div>
  </div>

  <p class="footer-note">© 2026 Private Lives Matter</p>
</body>
</html>
